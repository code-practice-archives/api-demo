server:
  addr: ":8080"

log:
  level: info
  filename: logs/app.log
  max_size: 100      # MB
  max_backups: 7
  max_age: 30        # days
  compress: true

db:
  user: root
  password: root
  host: 127.0.0.1
  port: 3306
  database: api_demo

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0

jwt:
  secret: "dev-secret-change-me"
  expire_hours: 1          # access token TTL（小时），尽量短
  refresh_expire_days: 7   # opaque refresh token RTTL（天）

auth:
  max_retries: 5   # 连续登录失败次数上限
  lock_minutes: 15 # 达到上限后锁定分钟数

rate_limit:
  enabled: true
  limit: 120             # 每个窗口内同一 IP 最多请求数
  window_seconds: 60     # 固定窗口时长（秒）

# 私有接口（/api/v1/private/*）仅允许白名单 IP 访问
ip_allowlist:
  enabled: true
  ips:
    - "127.0.0.1"
    - "::1"
    # - "10.0.0.0/8"   # 也支持 CIDR
